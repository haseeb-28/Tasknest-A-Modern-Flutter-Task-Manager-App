name: tasknest
description: A Flutter Task Manager App with Supabase and REST API integration.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.3.0
  http: ^1.2.0
  intl: ^0.19.0
  google_fonts: ^6.1.0
  uuid: ^4.3.3
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true